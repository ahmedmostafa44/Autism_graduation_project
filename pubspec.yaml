name: autism_app
description: Autism Support App - Graduation Project
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  bloc: ^8.1.2
  cached_network_image: ^3.3.0
  cloud_firestore: ^5.0.0
  cupertino_icons: ^1.0.6
  equatable: ^2.0.5
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_svg: ^2.0.9
  flutter_tts: ^4.2.5
  go_router: ^12.0.0
  google_fonts: ^6.1.0
  http: ^1.6.0
  intl: ^0.18.1
  lottie: ^3.0.0
  path: ^1.9.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  sqflite: ^2.3.0
  uuid: ^4.2.1
  flutter_gemma: ^0.11.5
  flutter_gemini: ^3.0.0
  printing: ^5.12.0
  pdf:
    ^3.10.8 # PDF generation for parent report
  flutter_dotenv: ^6.0.0
    # Print / share PDF
    # Google Gemini Flutter SDK

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
